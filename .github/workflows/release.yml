name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build & publication (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux .deb + AppImage
            bundles: deb,appimage
            artifacts: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            name: Windows MSI + NSIS
            bundles: msi,nsis
            artifacts: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dépendances système Tauri (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # Dev-kit GStreamer MSVC + pkg-config pour lier le crate gstreamer
      # (montage/clip) sous Windows. MSI en cache (serveur freedesktop instable).
      - name: Cache GStreamer MSIs
        if: runner.os == 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}\gst-msi
          key: gst-msi-1.26.11
      - name: GStreamer (dev + runtime, MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.26.11"
          $dir = "$env:RUNNER_TEMP\gst-msi"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          foreach ($msi in @("gstreamer-1.0-msvc-x86_64-$ver.msi", "gstreamer-1.0-devel-msvc-x86_64-$ver.msi")) {
            $dest = "$dir\$msi"
            if (-not (Test-Path $dest)) {
              Write-Host "Downloading $msi"
              $ok = $false
              for ($i = 1; $i -le 12 -and -not $ok; $i++) {
                curl.exe -L --fail -C - --connect-timeout 30 --max-time 600 -o $dest "$base/$msi"
                if ($LASTEXITCODE -eq 0) { $ok = $true } else { Write-Host "reprise $i"; Start-Sleep 10 }
              }
              if (-not $ok) { throw "échec du téléchargement : $msi" }
            } else { Write-Host "$msi (cache)" }
            Start-Process msiexec.exe -ArgumentList "/i `"$dest`" /quiet ADDLOCAL=ALL" -Wait -NoNewWindow
          }
          $root = "C:\gstreamer\1.0\msvc_x86_64"
          # pkgconf (séparateur ';' natif Windows) via MSYS2 préinstallé :
          # pkgconfiglite couperait PKG_CONFIG_PATH sur le ':' de 'C:', et
          # GStreamer ne livre pas de pkg-config.
          C:\msys64\usr\bin\pacman.exe -Sy --noconfirm --needed mingw-w64-x86_64-pkgconf
          $pc = "C:\msys64\mingw64\bin\pkgconf.exe"
          Write-Host "pkgconf=$(Test-Path $pc)  glib-2.0.pc=$(Test-Path "$root\lib\pkgconfig\glib-2.0.pc")  gstreamer-1.0.pc=$(Test-Path "$root\lib\pkgconfig\gstreamer-1.0.pc")"
          if (-not (Test-Path $pc)) { throw "pkgconf introuvable après pacman" }
          $env:PKG_CONFIG_PATH = "$root\lib\pkgconfig"
          & $pc --modversion glib-2.0 gstreamer-1.0
          if ($LASTEXITCODE -ne 0) { throw "pkgconf ne résout pas glib-2.0/gstreamer-1.0" }
          "PKG_CONFIG=$pc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Discord REC ${{ github.ref_name }}"
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }}

      # Provenance vérifiable : prouve que chaque binaire sort de cette CI,
      # depuis ce commit. Vérification :
      #   gh attestation verify <fichier> --repo micferna/discord-rec
      # Best-effort : une panne transitoire du service sigstore (tlog 404, …) ne
      # doit pas faire échouer la release — les binaires restent signés (minisign).
      - name: Attestation de provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.artifacts }}
