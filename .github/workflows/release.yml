name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & publication (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux .deb
            bundles: deb
          - os: windows-latest
            name: Windows installeur NSIS
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Dépendances système Tauri (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Discord REC ${{ github.ref_name }}"
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }}
