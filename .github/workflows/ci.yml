name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, tests & build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - name: Dépendances système Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --check

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  quality-windows:
    name: Lint, tests & build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  security:
    name: Audit sécurité (RUSTSEC, licences, sources)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri

      - name: cargo deny
        run: cargo deny check
        working-directory: src-tauri
