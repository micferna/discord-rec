name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, tests & build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dépendances système Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --check

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  quality-windows:
    name: Lint, tests & build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Le crate gstreamer (montage/clip) lie GStreamer : il faut le dev-kit
      # MSVC + pkg-config. Le runtime complet (ADDLOCAL=ALL) fournit aussi les
      # plugins (x264enc…) pour que les tests de coupe tournent réellement.
      - name: GStreamer (dev + runtime, MSVC)
        shell: pwsh
        working-directory: ${{ runner.temp }}
        run: |
          choco install pkgconfiglite -y --no-progress
          $ver = "1.26.0"
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          foreach ($msi in @("gstreamer-1.0-msvc-x86_64-$ver.msi", "gstreamer-1.0-devel-msvc-x86_64-$ver.msi")) {
            Write-Host "Installing $msi"
            Invoke-WebRequest -Uri "$base/$msi" -OutFile $msi
            Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet ADDLOCAL=ALL" -Wait -NoNewWindow
          }
          $root = "C:\gstreamer\1.0\msvc_x86_64"
          "PKG_CONFIG_PATH=$root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  security:
    name: Audit sécurité (RUSTSEC, licences, sources)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri

      - name: cargo deny
        run: cargo deny check
        working-directory: src-tauri
