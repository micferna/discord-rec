name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, tests & build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dépendances système Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --check

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  quality-windows:
    name: Lint, tests & build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Le crate gstreamer (montage/clip) lie GStreamer : il faut le dev-kit
      # MSVC + pkg-config. Le runtime complet (ADDLOCAL=ALL) fournit aussi les
      # plugins (x264enc…) pour que les tests de coupe tournent réellement. Les
      # MSI sont mis en cache : le serveur freedesktop est instable
      # (503/404/coupures) — une fois téléchargés, on les réutilise.
      - name: Cache GStreamer MSIs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}\gst-msi
          key: gst-msi-1.26.11
      - name: GStreamer (dev + runtime, MSVC)
        shell: pwsh
        run: |
          $ver = "1.26.11"
          $dir = "$env:RUNNER_TEMP\gst-msi"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          foreach ($msi in @("gstreamer-1.0-msvc-x86_64-$ver.msi", "gstreamer-1.0-devel-msvc-x86_64-$ver.msi")) {
            $dest = "$dir\$msi"
            if (-not (Test-Path $dest)) {
              Write-Host "Downloading $msi"
              $ok = $false
              for ($i = 1; $i -le 12 -and -not $ok; $i++) {
                curl.exe -L --fail -C - --connect-timeout 30 --max-time 600 -o $dest "$base/$msi"
                if ($LASTEXITCODE -eq 0) { $ok = $true } else { Write-Host "reprise $i"; Start-Sleep 10 }
              }
              if (-not $ok) { throw "échec du téléchargement : $msi" }
            } else { Write-Host "$msi (cache)" }
            Start-Process msiexec.exe -ArgumentList "/i `"$dest`" /quiet ADDLOCAL=ALL" -Wait -NoNewWindow
          }
          # Localise les .pc réellement installés (le chemin d'install n'est
          # pas garanti). Dump de l'arbre si introuvable, pour diagnostiquer.
          $pcfile = Get-ChildItem -Path "C:\gstreamer" -Recurse -Filter "gstreamer-1.0.pc" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pcfile) {
            Write-Host "=== arborescence C:\gstreamer ==="
            Get-ChildItem -Path "C:\gstreamer" -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "gstreamer-1.0.pc introuvable apres installation"
          }
          $pkgdir = $pcfile.Directory.FullName
          $root = $pcfile.Directory.Parent.Parent.FullName
          Write-Host "GStreamer root=$root  pkgconfig=$pkgdir"
          # pkgconf (séparateur ';' natif Windows) via MSYS2 : pkgconfiglite
          # couperait PKG_CONFIG_PATH sur le ':' de 'C:', et GStreamer n'a pas
          # de pkg-config.
          C:\msys64\usr\bin\pacman.exe -Sy --noconfirm --needed mingw-w64-x86_64-pkgconf
          $pc = "C:\msys64\mingw64\bin\pkgconf.exe"
          if (-not (Test-Path $pc)) { throw "pkgconf introuvable après pacman" }
          $env:PKG_CONFIG_PATH = $pkgdir
          & $pc --modversion glib-2.0 gstreamer-1.0
          if ($LASTEXITCODE -ne 0) { throw "pkgconf ne résout pas glib-2.0/gstreamer-1.0" }
          "PKG_CONFIG=$pc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$pkgdir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Clippy (pedantic, zéro warning)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  security:
    name: Audit sécurité (RUSTSEC, licences, sources)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri

      - name: cargo deny
        run: cargo deny check
        working-directory: src-tauri
